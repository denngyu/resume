                --text-muted: #8b93a3;
                --border: #e6e9ef;
                --accent: #2f5bd6;
                --accent-hover: #2249b8;
                --accent-soft: rgba(47, 91, 214, 0.08);

                --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
                --ease: cubic-bezier(0.4, 0, 0.2, 1);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: var(--font);
                color: var(--text);
                background: var(--bg);
                -webkit-font-smoothing: antialiased;
            }

            .staticrypt-content {
                height: 100%;
                background: radial-gradient(1100px 520px at 50% -8%, var(--accent-soft), transparent 65%), var(--bg);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                box-sizing: border-box;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
            }

            .staticrypt-form {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                box-shadow: 0 12px 40px rgba(15, 23, 50, 0.10), 0 2px 10px rgba(20, 30, 60, 0.06);
                padding: 40px 36px 34px;
                text-align: left;
                animation: cardIn 0.45s var(--ease) backwards;
            }

            @keyframes cardIn {
                from {
                    opacity: 0;
                    transform: translateY(14px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            .staticrypt-eyebrow {
                color: var(--accent);
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 2px;
                margin: 0 0 10px;
            }

            .staticrypt-title {
                font-size: 26px;
                font-weight: 800;
                letter-spacing: 1px;
                margin: 0 0 6px;
            }

            .staticrypt-instructions p.staticrypt-sub {
                color: var(--text-2);
                font-size: 14px;
                margin: 0;
                line-height: 1.65;
            }

            .staticrypt-hr {
                margin: 22px 0;
                border: 0;
                border-top: 1px solid var(--border);
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                margin: 0 0 14px;
                box-sizing: border-box;
                transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
            }

            .staticrypt-password-container:focus-within {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-soft);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: var(--mono);
                font-size: 15px;
                letter-spacing: 1px;
                color: var(--text);
                outline: 0;
                padding: 13px 44px 13px 14px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                font-family: var(--font);
                letter-spacing: 0;
                color: var(--text-muted);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.45;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.15s var(--ease);
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.8;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 16px;
                color: var(--text-2);
                font-size: 13px;
                cursor: pointer;
                user-select: none;
            }

            .staticrypt-remember input[type="checkbox"] {
                width: 15px;
                height: 15px;
                margin: 0 8px 0 0;
                accent-color: var(--accent);
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: var(--accent);
                width: 100%;
                border: 0;
                border-radius: 8px;
                padding: 13px;
                color: #ffffff;
                font-family: var(--font);
                font-size: 15px;
                font-weight: 600;
                letter-spacing: 2px;
                cursor: pointer;
                box-shadow: 0 1px 2px rgba(20, 30, 60, 0.05);
                transition: background 0.15s var(--ease), transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent-hover);
                transform: translateY(-1px);
                box-shadow: 0 2px 10px rgba(20, 30, 60, 0.10);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: none;
            }

            .staticrypt-foot {
                text-align: center;
                color: var(--text-muted);
                font-size: 12px;
                margin: 18px 0 0;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid var(--accent);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .staticrypt-form {
                    animation: none;
                }
            }

            @media (max-width: 480px) {
                .staticrypt-form {
                    padding: 32px 24px 28px;
                }
            }
        </style>
